<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المواجهة | VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0a0e17; 
            color: white; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-user-select: none; 
            user-select: none; 
            transition: filter 0.3s;
        }
        /* خدعة الحماية من الاسكرين شوت: تشويش المحتوى عند فقدان التركيز */
        .protected { filter: blur(20px) grayscale(1); }
        
        .glass { background: rgba(22, 30, 45, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .answer-btn { background: #161e2d; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; cursor: pointer; position: relative; overflow: hidden; }
        .answer-btn:active { transform: scale(0.95); background: #d4af37; color: black; }
        .correct { background: #10b981 !important; border-color: #059669 !important; color: white !important; font-weight: 900; }
        .wrong { background: #ef4444 !important; border-color: #b91c1c !important; color: white !important; }
        .timer-line { height: 4px; background: linear-gradient(to left, #d4af37, #f59e0b); width: 100%; transition: width 1s linear; }
        #result-screen { display: none; position: fixed; inset: 0; background: rgba(5, 5, 5, 0.95); z-index: 1000; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body class="p-4" id="main-body">

    <div class="fixed top-0 left-0 w-full h-1 bg-gray-800 z-50">
        <div id="t-bar" class="timer-line"></div>
    </div>

    <div class="max-w-md mx-auto h-screen flex flex-col">
        <div class="flex justify-between items-center mt-6 mb-8">
            <div class="glass px-4 py-2 rounded-2xl border-l-4 border-yellow-500">
                <span class="text-[10px] text-gray-400 block font-bold">السؤال</span>
                <span id="q-num" class="text-lg font-black text-yellow-500">1</span> <small class="text-gray-500">/ 15</small>
            </div>
            
            <div class="flex gap-2">
                <button id="help-freeze" onclick="useFreeze()" class="glass w-12 h-12 rounded-xl flex items-center justify-center text-blue-400 border border-blue-500/30">
                    <i class="fas fa-snowflake"></i>
                </button>
                <button id="help-50" onclick="use5050()" class="glass w-12 h-12 rounded-xl flex items-center justify-center text-purple-400 border border-purple-500/30">
                    <i class="fas fa-cut"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-center">
            <div id="q-area" class="mb-10 text-center">
                <h2 id="q-text" class="text-xl font-black leading-relaxed">جاري استدعاء التحدي...</h2>
            </div>

            <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
        </div>
    </div>

    <div id="result-screen">
        <div class="p-8 w-full">
            <div class="w-24 h-24 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_50px_rgba(212,175,55,0.3)]">
                <i class="fas fa-trophy text-black text-4xl"></i>
            </div>
            <h2 id="result-title" class="text-3xl font-black mb-2">انتهى الوقت!</h2>
            <p id="result-desc" class="text-gray-500 font-bold mb-8">أداء بطل، إليك ما جمعته اليوم:</p>
            
            <div class="glass p-6 rounded-3xl border border-yellow-500/20 mb-10">
                <span class="text-xs text-gray-400 block mb-1 font-bold uppercase">النقاط المكتسبة</span>
                <span id="final-pts" class="text-6xl font-black text-yellow-500">0</span>
            </div>

            <button onclick="window.location.href='index.html'" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform">
                العودة للملعب <i class="fas fa-arrow-left mr-2"></i>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8", 
            projectId: "ramadan-87817"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 15;
        let isPaused = false;
        let helpUsed = { freeze: false, cut: false };
        let isGameOver = false;

        // ==========================
        // أنظمة الحماية المتقدمة
        // ==========================

        // 1. منع الرجوع (Back Button)
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.pushState(null, null, window.location.href);
            alert("ممنوع الرجوع أثناء الجولة! كمل للاخر.");
        };

        // 2. منع الـ Screenshot والـ تحديث (الخدع البرمجية)
        document.addEventListener('keydown', (e) => {
            // منع F12, Ctrl+Shift+I, Ctrl+U, PrintScreen, Ctrl+P
            if (e.key === "PrintScreen" || e.keyCode === 44) {
                alert("تصوير الشاشة ممنوع!");
                e.preventDefault();
            }
            if (e.ctrlKey && (e.key === 'p' || e.key === 'u' || e.shiftKey && e.key === 'i')) {
                e.preventDefault();
            }
        });

        // 3. منع الضغط المطول والقائمة اليمين (لمنع البحث عن السؤال)
        document.oncontextmenu = (e) => e.preventDefault();

        // 4. حماية الخروج المفاجئ (حفظ النقاط فوراً)
        window.addEventListener('beforeunload', (e) => {
            if (!isGameOver && currentIdx > 0) {
                finish(true); // حفظ النقاط قبل الخروج
            }
        });

        // 5. التشويش عند فقدان التركيز (حماية من تصوير الموبايل)
        window.onblur = () => {
            if (!isGameOver) document.getElementById('main-body').classList.add('protected');
        };
        window.onfocus = () => {
            document.getElementById('main-body').classList.remove('protected');
        };

        // ==========================
        // منطق الكويز
        // ==========================

        async function initQuiz() {
            const urlParams = new URLSearchParams(window.location.search);
            const day = urlParams.get('day');
            
            const status = await db.collection("settings").doc("global_status").get();
            const config = status.data();
            
            if (!config || config.currentDay != day || config.status !== 'active') {
                alert("الجولة دي مش مفعلة دلوقتي!");
                window.location.href = 'index.html';
                return;
            }

            const quizDoc = await db.collection("quizzes_pool").doc(`day_${day}`).get();
            if (quizDoc.exists && quizDoc.data().variations && quizDoc.data().variations[0]) {
                questions = quizDoc.data().variations[0].questions;
                startStep();
            } else {
                alert("مفيش أسئلة مضافة هنا!");
                window.location.href = 'index.html';
            }
        }

        function startStep() {
            if (currentIdx >= questions.length) return finish();
            
            isPaused = false;
            timeLeft = 15;
            document.getElementById('q-num').innerText = currentIdx + 1;
            const q = questions[currentIdx];
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            q.options.forEach((opt, i) => {
                grid.innerHTML += `
                    <button onclick="checkAns(${i})" class="answer-btn p-5 rounded-2xl text-right font-bold text-sm">
                        ${opt}
                    </button>`;
            });

            runTimer();
        }

        function runTimer() {
            clearInterval(timer);
            const bar = document.getElementById('t-bar');
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    bar.style.width = (timeLeft / 15 * 100) + "%";
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        checkAns(-1); 
                    }
                }
            }, 1000);
        }

        function useFreeze() {
            if (helpUsed.freeze) return;
            helpUsed.freeze = true;
            isPaused = true;
            document.getElementById('help-freeze').style.opacity = "0.2";
            setTimeout(() => { isPaused = false; }, 10000);
        }

        function use5050() {
            if (helpUsed.cut) return;
            helpUsed.cut = true;
            document.getElementById('help-50').style.opacity = "0.2";
            const correct = questions[currentIdx].correctIndex;
            const btns = document.querySelectorAll('.answer-btn');
            let hidden = 0;
            btns.forEach((btn, i) => {
                if (i !== correct && hidden < 2) {
                    btn.style.visibility = "hidden";
                    hidden++;
                }
            });
        }

        async function checkAns(idx) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const btns = document.querySelectorAll('.answer-btn');
            
            btns[q.correctIndex].classList.add('correct');
            
            if (idx === q.correctIndex) {
                score++;
            } else if (idx !== -1) {
                btns[idx].classList.add('wrong');
            }

            setTimeout(() => {
                currentIdx++;
                startStep();
            }, 1200);
        }

        async function finish(isLeaver = false) {
            if (isGameOver) return; // منع تكرار الحفظ
            isGameOver = true;
            clearInterval(timer);

            const pass = localStorage.getItem('user_pass');
            const day = new URLSearchParams(window.location.search).get('day');
            
            try {
                const userSnap = await db.collection("users").where("password", "==", pass).get();
                if (!userSnap.empty) {
                    const userRef = userSnap.docs[0].ref;
                    
                    // تحديث السكور الإجمالي
                    await userRef.update({
                        score: firebase.firestore.FieldValue.increment(score)
                    });

                    // تسجيل اللوج
                    await userRef.collection("game_logs").doc(`day_${day}`).set({
                        day: parseInt(day),
                        score: score,
                        timestamp: Date.now(),
                        status: isLeaver ? "انسحاب" : "اكتمل"
                    });
                }
            } catch (e) {
                console.log("Error saving score");
            }

            if (!isLeaver) {
                document.getElementById('final-pts').innerText = score;
                document.getElementById('result-screen').style.display = 'flex';
                if (currentIdx < questions.length) {
                    document.getElementById('result-title').innerText = "انسحاب!";
                    document.getElementById('result-desc').innerText = "تم حفظ نقاطك اللي جمعتها قبل ما تطلع:";
                }
            }
        }

        initQuiz();
    </script>
</body>
                    </html>
