<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0a0e17; color: white; overflow-x: hidden; }
        
        .premium-card { background: #161e2d; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 14px; text-align: center; cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .nav-btn.active { background: #d4af37; color: black; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .active-glow { border: 2px solid #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        
        /* انيميشن التحميل */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d4af37; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-app" class="max-w-md mx-auto p-4 transition-opacity duration-700">
        <div class="premium-card p-4 flex justify-between items-center mb-6 relative">
            <button onclick="logOut()" class="bg-red-900/30 text-red-500 p-2 px-3 rounded-xl text-[10px] font-bold border border-red-500/20">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
            
            <div class="text-right flex-1 px-4">
                <h2 id="player-name" class="font-black text-sm">جاري التحميل...</h2>
                <div class="flex items-center justify-end gap-1 mt-1">
                    <span id="player-group" class="text-[9px] bg-blue-900/40 text-blue-300 px-2 py-0.5 rounded-full border border-blue-500/20">...</span>
                    <span id="player-team" class="text-[9px] bg-purple-900/40 text-purple-300 px-2 py-0.5 rounded-full border border-purple-500/20">...</span>
                </div>
            </div>

            <div class="bg-black/40 px-3 py-1.5 rounded-xl text-center border border-white/5">
                <p class="text-[8px] text-gray-400 uppercase">نقاطك</p>
                <p id="player-score" class="text-lg font-black text-yellow-500 leading-none">0</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6 bg-[#161e2d] p-1.5 rounded-2xl border border-white/5">
            <div class="nav-btn active" id="btn-map" onclick="switchView('map')"><i class="fas fa-map-marked-alt ml-1"></i> الخريطة</div>
            <div class="nav-btn" id="btn-rank" onclick="switchView('rank')"><i class="fas fa-trophy ml-1"></i> الترتيب</div>
        </div>

        <div id="view-map" class="space-y-3">
            <div class="text-center p-10"><div class="loader"></div> <p class="text-xs mt-2 text-gray-500">جاري تحميل الجولات...</p></div>
        </div>

        <div id="view-rank" class="hidden">
            <div class="text-center mb-4">
                <h3 class="text-yellow-500 font-black text-sm">ترتيب مجموعتك</h3>
                <p class="text-[10px] text-gray-500">يتم التحديث لحظياً</p>
            </div>
            <div id="rank-list" class="space-y-2">
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8", projectId: "ramadan-87817" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userPass = localStorage.getItem('user_pass');
        let userData = null;
        let globalStatus = { currentDay: 0, status: 'closed' }; // تخزين حالة الملعب بشكل عام

        function initApp() {
            if(!userPass) {
                window.location.href = 'login.html';
                return;
            }

            // مراقبة حالة الملعب لحظياً
            db.collection("settings").doc("global_status").onSnapshot(doc => {
                if(doc.exists) {
                    globalStatus = doc.data();
                    // تحديث الخريطة فوراً عند تغيير الحالة من اللوحة
                    if(userData) renderMap(); 
                }
            });

            // سحب بيانات المستخدم واسم مجموعته
            db.collection("users").where("password", "==", userPass).onSnapshot(snap => {
                if(snap.empty) {
                    logOut();
                    return;
                }
                const doc = snap.docs[0];
                userData = { id: doc.id, ...doc.data() };
                
                document.getElementById('player-name').innerText = userData.name;
                document.getElementById('player-group').innerText = userData.group || 'بدون مجموعة';
                document.getElementById('player-team').innerText = userData.team || 'فردي';
                document.getElementById('player-score').innerText = userData.score || 0;

                // تحميل الجولات والترتيب
                renderMap();
                loadRanking();
            }, err => {
                console.error("Firebase Error:", err);
                alert("مشكلة في الاتصال بالانترنت!");
            });
        }

        async function renderMap() {
            try {
                // سحب الجولات اللي اللاعب حلها
                const logsSnap = await db.collection("users").doc(userData.id).collection("game_logs").get();
                const playedRounds = logsSnap.docs.map(l => parseInt(l.id.replace('day_', '')));

                const container = document.getElementById('view-map');
                container.innerHTML = "";

                for(let i=1; i<=30; i++) {
                    const isPlayed = playedRounds.includes(i);
                    const isActive = (globalStatus.currentDay == i && globalStatus.status === 'active');
                    const isSoon = (globalStatus.currentDay == i && globalStatus.status === 'soon');

                    let scoreForRound = 0;
                    if(isPlayed) {
                        const log = logsSnap.docs.find(l => l.id === `day_${i}`);
                        scoreForRound = log ? log.data().score : 0;
                    }

                    let cardHtml = "";
                    if(isPlayed) {
                        cardHtml = `
                        <div class="premium-card p-4 flex justify-between items-center opacity-80 border-r-4 border-green-500">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-check-circle text-green-500"></i>
                                <div><p class="font-bold text-sm">الجولة ${i}</p><p class="text-[9px] text-gray-500">تم الإنجاز</p></div>
                            </div>
                            <span class="text-green-500 font-black text-sm">+${scoreForRound}</span>
                        </div>`;
                    } else if(isActive) {
                        cardHtml = `
                        <div class="premium-card active-glow p-4 flex justify-between items-center bg-gradient-to-l from-yellow-500/10 to-transparent" onclick="window.location.href='quiz.html?day=${i}'">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                                <div><p class="font-black text-sm">الجولة ${i}</p><p class="text-[9px] text-yellow-500 font-bold">العب الآن!</p></div>
                            </div>
                            <i class="fas fa-chevron-left text-yellow-500"></i>
                        </div>`;
                    } else if(isSoon) {
                        cardHtml = `
                        <div class="premium-card p-4 flex justify-between items-center border border-blue-500/30 bg-blue-900/10 transition-all duration-500">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-clock text-blue-400 animate-bounce"></i>
                                <div>
                                    <p class="font-black text-sm text-blue-100">الجولة ${i}</p>
                                    <p class="text-[10px] text-blue-400 font-bold">تفتح قريباً... استعد!</p>
                                </div>
                            </div>
                            <i class="fas fa-hourglass-half text-blue-500/50"></i>
                        </div>`;
                    } else {
                        cardHtml = `
                        <div class="premium-card p-4 flex justify-between items-center opacity-30">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-lock text-gray-600"></i>
                                <p class="font-bold text-sm text-gray-500">الجولة ${i}</p>
                            </div>
                        </div>`;
                    }
                    container.innerHTML += cardHtml;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('view-map').innerHTML = "<p class='text-center text-red-500 text-xs'>فشل تحميل الخريطة</p>";
            }
        }

        function loadRanking() {
            if(!userData.group) return;

            db.collection("users")
                .where("group", "==", userData.group)
                .orderBy("score", "desc")
                .onSnapshot(snap => {
                    const list = document.getElementById('rank-list');
                    if(snap.empty) {
                        list.innerHTML = "<p class='text-center text-gray-600 text-xs p-10'>لا يوجد متسابقين في مجموعتك بعد</p>";
                        return;
                    }
                    list.innerHTML = "";
                    snap.forEach((doc, i) => {
                        const u = doc.data();
                        const isMe = u.password === userPass;
                        list.innerHTML += `
                            <div class="${isMe ? 'bg-yellow-500/10 border-yellow-500/50' : 'bg-white/5'} p-3 rounded-2xl flex items-center justify-between border border-transparent transition-all">
                                <div class="flex items-center gap-3">
                                    <span class="font-black ${i < 3 ? 'text-yellow-500' : 'text-gray-500'} w-5 text-center text-sm">${i+1}</span>
                                    <span class="font-bold text-xs ${isMe ? 'text-yellow-500' : 'text-white'}">${u.name} ${isMe ? '(أنت)' : ''}</span>
                                </div>
                                <span class="font-black text-sm">${u.score || 0}</span>
                            </div>`;
                    });
                });
        }

        function switchView(v) {
            document.getElementById('view-map').classList.toggle('hidden', v !== 'map');
            document.getElementById('view-rank').classList.toggle('hidden', v !== 'rank');
            document.getElementById('btn-map').classList.toggle('active', v === 'map');
            document.getElementById('btn-rank').classList.toggle('active', v === 'rank');
        }

        function logOut() {
            localStorage.removeItem('user_pass');
            window.location.href = 'login.html';
        }

        // تشغيل التطبيق
        initApp();
    </script>
</body>
</html>
