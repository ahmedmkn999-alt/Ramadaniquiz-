<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ملعب رمضان | التطبيق الرسمي</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0a0e17; color: white; overflow-x: hidden; }
        
        /* شاشة الحماية من المتصفح */
        #install-guard {
            display: none; position: fixed; inset: 0; background: #0a0e17; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px;
        }

        .premium-card { background: #161e2d; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: 0.3s; }
        .active-round { border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .play-btn { width: 50px; height: 50px; background: #d4af37; border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .nav-bar { background: #161e2d; border-radius: 15px; display: flex; padding: 5px; margin-bottom: 20px; }
        .nav-item { flex: 1; padding: 10px; text-align: center; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: #d4af37; color: black; }
    </style>
</head>
<body>

    <div id="install-guard">
        <div class="w-24 h-24 bg-yellow-500 rounded-3xl mb-6 flex items-center justify-center shadow-2xl">
            <i class="fas fa-mobile-alt text-5xl text-black"></i>
        </div>
        <h1 class="text-2xl font-black mb-2 text-yellow-500">ثبت التطبيق أولاً!</h1>
        <p class="text-gray-400 text-sm mb-8">عشان تاخد أفضل تجربة وتدخل المسابقة، لازم تضيف التطبيق لشاشتك الرئيسية.</p>
        
        <div id="ios-inst" class="hidden w-full bg-[#161e2d] p-4 rounded-2xl border border-gray-700">
            <p class="text-xs mb-4">لمستخدمي آيفون (سفاري):</p>
            <div class="flex items-center gap-3 text-sm font-bold">
                <span>1. اضغط على زر المشاركة</span>
                <i class="fas fa-share-square text-blue-400 text-xl"></i>
            </div>
            <div class="h-[1px] bg-gray-700 my-3"></div>
            <div class="flex items-center gap-3 text-sm font-bold">
                <span>2. اختر "إضافة إلى الشاشة الرئيسية"</span>
                <i class="fas fa-plus-square text-gray-300 text-xl"></i>
            </div>
        </div>

        <button id="android-btn" class="hidden bg-yellow-500 text-black font-black py-4 px-10 rounded-2xl shadow-lg">
            تثبيت التطبيق الآن 📲
        </button>
    </div>

    <div id="app-content" class="max-w-md mx-auto p-4 opacity-0 transition-opacity duration-500">
        
        <div class="premium-card p-4 flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-yellow-600 rounded-xl flex items-center justify-center font-black text-black">U</div>
                <div>
                    <h2 id="u-name" class="font-black text-sm">جاري التحميل...</h2>
                    <p id="u-team" class="text-[10px] text-blue-400 font-bold">...</p>
                </div>
            </div>
            <div class="text-center bg-black/40 px-4 py-2 rounded-xl border border-white/5">
                <p class="text-[10px] text-gray-400">نقاطك</p>
                <p id="u-score" class="text-xl font-black text-yellow-500">0</p>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="showTab('map', this)">🗺️ الخريطة</div>
            <div class="nav-item" onclick="showTab('rank', this)">🏆 المجموعة</div>
        </div>

        <div id="tab-map">
            <div id="rounds-container" class="space-y-4">
                </div>
        </div>

        <div id="tab-rank" class="hidden">
            <h3 class="text-center text-gray-500 font-bold text-xs mb-4">ترتيب مجموعتك</h3>
            <div id="rank-list" class="space-y-2"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // تسجيل الـ Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
