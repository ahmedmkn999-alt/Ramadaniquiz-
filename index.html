<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المواجهة | VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0a0e17; 
            color: white; 
            overflow: hidden; 
            touch-action: manipulation; 
            -webkit-user-select: none;
        }

        /* الاستايل الدهبي والأسود بتاعك */
        .glass { 
            background: rgba(22, 30, 45, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .q-box { 
            border: 2px solid #d4af37; 
            border-radius: 20px; 
            padding: 10px 25px; 
            background: rgba(212, 175, 55, 0.05);
        }

        .help-btn { 
            width: 55px; 
            height: 55px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #161e2d; 
            cursor: pointer;
            transition: 0.3s;
        }

        .answer-btn { 
            background: #161e2d; 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 22px; 
            border-radius: 20px; 
            text-align: right; 
            transition: 0.2s; 
            width: 100%; 
            font-weight: 700;
            font-size: 1.1rem;
            position: relative;
        }

        .answer-btn:active { 
            transform: scale(0.96); 
            background: #d4af37; 
            color: black; 
        }

        .correct { background: #10b981 !important; color: white; border-color: #059669; font-weight: 900; }
        .wrong { background: #ef4444 !important; color: white; border-color: #b91c1c; }

        .timer-line { 
            position: fixed; 
            top: 0; 
            left: 0; 
            height: 5px; 
            background: linear-gradient(to left, #d4af37, #f59e0b); 
            width: 100%; 
            transition: width 1s linear; 
            z-index: 100;
        }

        /* شاشة النتيجة */
        #result-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a0e17;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body class="p-6">

    <div id="t-bar" class="timer-line"></div>

    <div class="max-w-md mx-auto flex flex-col h-screen">
        
        <div class="flex justify-between items-center mt-6 mb-12">
            <div class="flex gap-3">
                <div id="btn-50" onclick="use5050()" class="help-btn text-purple-400">
                    <i class="fas fa-cut text-xl"></i>
                </div>
                <div id="btn-freeze" onclick="useFreeze()" class="help-btn text-blue-400">
                    <i class="fas fa-snowflake text-xl"></i>
                </div>
            </div>

            <div class="q-box">
                <div class="text-[10px] text-gray-400 font-bold text-center uppercase tracking-widest">السؤال</div>
                <div class="text-2xl font-black text-white"><span id="q-num">1</span><span class="text-yellow-500 mx-1">/</span><span class="text-gray-500 text-lg">15</span></div>
            </div>
        </div>

        <div class="flex-grow flex flex-col justify-center mb-10">
            <div id="q-area" class="text-center">
                <h2 id="q-text" class="text-2xl font-black leading-relaxed">جاري استدعاء المواجهة...</h2>
            </div>
        </div>

        <div id="options-grid" class="grid grid-cols-1 gap-4 mb-8">
            </div>
    </div>

    <div id="result-screen">
        <div class="w-24 h-24 bg-yellow-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(212,175,55,0.3)]">
            <i class="fas fa-trophy text-black text-4xl"></i>
        </div>
        <h2 class="text-3xl font-black mb-2 text-white">انتهت المواجهة!</h2>
        <p class="text-gray-400 font-bold mb-10">أداء بطل، إليك ما حققته:</p>
        
        <div class="glass w-full p-8 rounded-3xl border border-yellow-500/20 mb-12">
            <span class="text-xs text-gray-500 block mb-2 font-bold uppercase tracking-widest">مجموع النقاط</span>
            <span id="final-score" class="text-7xl font-black text-yellow-500">0</span>
        </div>

        <button onclick="window.location.href='index.html'" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform">
            العودة للملعب <i class="fas fa-arrow-left mr-2"></i>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBZMnIJ_IOqeAfXqFt-m4tM1Lvo0tUDnk8", 
            projectId: "ramadan-87817"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 15;
        let isPaused = false;
        let used50 = false;
        let usedFreeze = false;

        async function initQuiz() {
            const urlParams = new URLSearchParams(window.location.search);
            const day = urlParams.get('day');
            
            try {
                // التأكد من حالة الجولة
                const settings = await db.collection("settings").doc("global_status").get();
                const config = settings.data();
                
                if (!config || config.currentDay != day || config.status !== 'active') {
                    alert("عفواً، هذه الجولة غير متاحة حالياً!");
                    window.location.href = 'index.html';
                    return;
                }

                // سحب الأسئلة
                const quizDoc = await db.collection("quizzes_pool").doc(`day_${day}`).get();
                if (quizDoc.exists) {
                    const data = quizDoc.data();
                    // قراءة ذكية للداتا سواء في variations أو مباشرة
                    questions = data.variations?.["0"]?.questions || data["variations.0"]?.questions || [];
                    
                    if (questions.length > 0) {
                        renderQuestion();
                    } else {
                        alert("لا توجد أسئلة مضافة لهذه الجولة!");
                    }
                }
            } catch (error) {
                console.error(error);
                alert("حدث خطأ في الاتصال، حاول مجدداً.");
            }
        }

        function renderQuestion() {
            if (currentIdx >= questions.length) return showResult();
            
            isPaused = false;
            timeLeft = 15;
            const q = questions[currentIdx];
            
            document.getElementById('q-num').innerText = currentIdx + 1;
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            
            q.options.forEach((opt, i) => {
                grid.innerHTML += `
                    <button onclick="checkAnswer(${i})" class="answer-btn">
                        ${opt}
                    </button>`;
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            const bar = document.getElementById('t-bar');
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    bar.style.width = (timeLeft / 15 * 100) + "%";
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        checkAnswer(-1); // الوقت خلص
                    }
                }
            }, 1000);
        }

        function useFreeze() {
            if (usedFreeze) return;
            usedFreeze = true;
            isPaused = true;
            document.getElementById('btn-freeze').style.opacity = "0.2";
            setTimeout(() => { isPaused = false; }, 8000); // تجميد 8 ثواني
        }

        function use5050() {
            if (used50) return;
            used50 = true;
            document.getElementById('btn-50').style.opacity = "0.2";
            const correct = questions[currentIdx].correctIndex;
            const btns = document.querySelectorAll('.answer-btn');
            let removed = 0;
            btns.forEach((btn, i) => {
                if (i !== correct && removed < 2) {
                    btn.style.visibility = "hidden";
                    removed++;
                }
            });
        }

        async function checkAnswer(selectedIdx) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const btns = document.querySelectorAll('.answer-btn');
            
            // إظهار الإجابة الصحيحة
            btns[q.correctIndex].classList.add('correct');
            
            if (selectedIdx === q.correctIndex) {
                score++;
            } else if (selectedIdx !== -1) {
                btns[selectedIdx].classList.add('wrong');
            }

            setTimeout(() => {
                currentIdx++;
                renderQuestion();
            }, 1200);
        }

        async function showResult() {
            const pass = localStorage.getItem('user_pass');
            const day = new URLSearchParams(window.location.search).get('day');
            
            // تحديث نقاط المستخدم في الداتابيز
            const userSnap = await db.collection("users").where("password", "==", pass).get();
            if(!userSnap.empty) {
                const userRef = userSnap.docs[0].ref;
                await userRef.update({
                    score: firebase.firestore.FieldValue.increment(score)
                });
                // تسجيل اللوج
                await userRef.collection("game_logs").doc(`day_${day}`).set({
                    day: day,
                    score: score,
                    time: Date.now()
                });
            }

            document.getElementById('final-score').innerText = score;
            document.getElementById('result-screen').style.display = 'flex';
        }

        initQuiz();
    </script>
</body>
    </html>
